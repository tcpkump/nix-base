gui:
  timeFormat: "02 Jan 06 15:04"
  # Use side-by-side diffs when the screen is wide enough
  sideBySideDiff: auto

git:
  pagers:
    - colorArg: always
      pager: >
        delta --paging never --syntax-theme none --line-numbers
        --file-style yellow
        --file-decoration-style "yellow ul"
        --hunk-header-decoration-style "yellow box"
        --hunk-header-file-style yellow
        --hunk-header-line-number-style yellow
        --inline-hint-style yellow

  commitPrefix:
    - pattern: "(\\w+)[-_](\\d+).*"
      replace: '[$1-$2] '

  # https://github.com/jesseduffield/lazygit/issues/3758 for signing commits
  overrideGpg: true

# Custom commands to make PR workflows faster
customCommands:
  - key: 'P'
    command: "git diff {{.SelectedLocalBranch.Name}}...HEAD | delta --paging always"
    context: 'localBranches'
    description: 'PR Diff (against selected branch)'
    subprocess: true
  - key: 'O'
    command: "gh pr view --web"
    context: 'global'
    description: 'Open current PR on GitHub'
    output: log
